# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Build and Push Docker Images
on:
  workflow_call:
  push:
    branches:
      - main

jobs:
  list:
    runs-on: ubuntu-slim
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@v6
      - name: List images to build
        id: list
        run: |
          images=$(ls dockerfiles | jq --raw-input --slurp --compact-output 'split("\n") | [ .[] | select(length > 0) ]')
          echo $images
          echo "images=$images" >> "$GITHUB_OUTPUT"
  build:
    environment: push
    runs-on: ubuntu-latest
    needs: list
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list.outputs.images) }}
        platform:
          - platform: linux/amd64
            qemu: false
          - platform: linux/arm64
            qemu: true
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ matrix.platform.qemu }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: dockerfiles/${{ matrix.image }}
          file: dockerfiles/${{ matrix.image }}/Dockerfile
          push: true
          tags: thisguy/${{ matrix.image }}:latest
          platforms: ${{ matrix.platform.platform }}
