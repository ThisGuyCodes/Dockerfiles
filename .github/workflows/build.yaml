# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Build and Push Docker Images
on:
  workflow_call:
    inputs:
      tag:
        description: "Tag for the Docker image"
        required: true
        type: string
      org:
        description: "Username/org for the Docker images"
        required: true
        type: string
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_TAG: ${{ ((github.event_name == 'push' && github.ref_name == 'main') && 'latest') || inputs.tag }}
  DOCKER_ORG: ${{ ((github.event_name == 'push' && github.ref_name == 'main') && 'thisguy') || inputs.org }}

jobs:
  list:
    runs-on: ubuntu-slim
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@v6
      - name: List images to build
        id: list
        run: |
          set -x

          images=$(ls dockerfiles | jq --raw-input --slurp --compact-output 'split("\n") | [ .[] | select(length > 0) ]')
          echo $images
          echo "images=$images" >> "$GITHUB_OUTPUT"
  build:
    environment: push
    runs-on: ${{ matrix.platform.runner }}
    needs: list
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list.outputs.images) }}
        platform:
          # - platform_dunder: linux_arm64
          #   qemu: false
          #   runner: ubuntu-24.04-arm
          - platform_dunder: linux_amd64
            qemu: false
            runner: ubuntu-latest
    steps:
      - name: Generate platform_slash
        id: gen_slash
        run: |
          set -x

          platform_slash=$(sed 's|_|/|g' <<<${{ toJSON(matrix.platform.platform_dunder) }})
          echo "platform_slash=${platform_slash}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ matrix.platform.qemu }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ steps.gen_slash.outputs.platform_slash }}
          context: dockerfiles/${{ matrix.image }}
          file: dockerfiles/${{ matrix.image }}/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.DOCKER_ORG }}/${{ matrix.image }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          set -x

          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform.platform_dunder }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    runs-on: ubuntu-latest
    environment: push
    needs:
      - build
      - list
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list.outputs.images) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_ORG }}/${{ matrix.image }}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -x

          tag_args=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          images=$(printf '${{ env.DOCKER_ORG }}/${{ matrix.image }}@sha256:%s ' *)
          docker buildx imagetools create $tag_args $images
      - name: Inspect image
        run: |
          set -x

          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }}
